# Compatible with podman-compose for improved security (rootless containers)
# Copy to parent directory of all applications /opt
services:
  # ========== TEST DATABASE ==========
  authserver-test-db:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_test_data:/var/lib/postgresql
      - ./authserver/database/init-security.sql:/docker-entrypoint-initdb.d/01-security.sql:ro
    ports:
      - 5433:5432 # Different host port to avoid conflict with production (5432)
    networks:
      aztech-test-network:
        aliases:
          - authserver-test-db
          - postgres-test

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c pg_stat_statements.max=10000
    security_opt:
      - no-new-privileges:true

  # ========== TEST BACKEND ==========
  authserver-test-backend:
    image: localhost/opt_authserver-test-backend:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: authserver-test-db
      POSTGRES_EXTERNAL_PORT: 5432
      DISABLE_TLS: "true"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      SESSION_AUTH_KEY: ${SESSION_AUTH_KEY}
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      DOMAIN: ${DOMAIN}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      PORT: ${APP_PORT}
    ports:
      - "8081:8081"
    depends_on:
      authserver-test-db:
        condition: service_healthy
    networks:
      - aztech-test-network
    healthcheck:
      test: ["CMD", "sh", "-c", "SILENT=1 /opt/check-backend-health.sh"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s

  # ========== TEST FRONTEND ==========
  authserver-test-frontend:
    image: opt_authserver-test-frontend:latest
    restart: unless-stopped
    ports:
      - "4000:3000"
    networks:
      - aztech-test-network
    depends_on:
      authserver-test-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========== SECURITY SCANNING ==========
  # security-scanner-test:
  #   image: aquasecurity/trivy:latest
  #   container_name: security-scanner-test
  #   profiles: ["security"]
  #   command: >
  #     trivy image
  #     --format table
  #     --exit-code 1
  #     --ignore-unfixed
  #     --vuln-type os,library
  #     authserver-test-db:latest
  #     authserver-test-backend:latest
  #     authserver-test-frontend:latest
  #   volumes:
  #     - /tmp/trivy-cache:/root/.cache/trivy
  #   networks:
  #     - aztech-test-network

# Separate network for test environment
networks:
  aztech-test-network:
    driver: bridge
# Separate volume for test data
volumes:
  postgres_test_data: